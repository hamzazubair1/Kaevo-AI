name: Kaevo AI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Add linting steps as the project grows
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      #
      # - name: Install dependencies
      #   run: npm ci
      #
      # - name: Run linter
      #   run: npm run lint

      - name: Check for merge conflicts
        run: git diff --check

  # test:
